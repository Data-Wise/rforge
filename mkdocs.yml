site_name: RForge Plugin
site_description: R package ecosystem orchestrator - 41 self-contained commands for R package development, ecosystem management, CRAN submission, and intelligent orchestration (pure-Python lib/, no MCP server required)
site_url: https://data-wise.github.io/rforge/

repo_name: Data-Wise/rforge
repo_url: https://github.com/Data-Wise/rforge
edit_uri: edit/main/docs/

# docs/README.md is the GitHub-facing folder readme (version refs), not a site
# page — it conflicts with index.md. Exclude only the root one (leading slash);
# tutorials/README.md remains a real nav page. Specs are archived under archive/.
exclude_docs: |
  /README.md

theme:
  name: material
  palette:
    # Auto-switch by system preference; each entry also exposes a header toggle
    # so users can override manually.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

# Single source of truth for version/count strings rendered via mkdocs-macros
# (e.g. {{ rforge.version }}). Kept in sync from package.json by
# scripts/version_sync.py — do not hand-edit version/prev_version/release_date.
extra:
  rforge:
    version: "2.18.0"
    prev_version: "2.15.0"
    release_date: "2026-06-21"
    command_count: 41

plugins:
  - search
  - macros
  - social:
      cards_layout_options:
        background_color: "#00897b"
        color: "#fff"

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
