site_name: RForge Plugin
site_description: R package ecosystem orchestrator - 41 self-contained commands for R package development, ecosystem management, CRAN submission, and intelligent orchestration (pure-Python lib/, no MCP server required)
site_url: https://data-wise.github.io/rforge/

repo_name: Data-Wise/rforge
repo_url: https://github.com/Data-Wise/rforge
edit_uri: edit/main/docs/

# docs/README.md is the GitHub-facing folder readme (version refs), not a site
# page — it conflicts with index.md. Exclude only the root one (leading slash);
# tutorials/README.md and specs/README.md remain real nav pages.
exclude_docs: |
  /README.md
  specs/_TEMPLATE-*.md
  specs/RESEARCH-*.md

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

# Single source of truth for version/count strings rendered via mkdocs-macros
# (e.g. {{ rforge.version }}). Kept in sync from package.json by
# scripts/version_sync.py — do not hand-edit version/prev_version/release_date.
extra:
  rforge:
    version: "2.11.1"
    prev_version: "2.11.0"
    release_date: "2026-06-13"
    command_count: 41

plugins:
  - search
  - macros

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Get Started:
    - 📦 Installation: installation.md
    - 🚀 Quick Start (3 min): QUICK-START.md
    - 📖 Detailed Quick Start: quickstart.md
  - Learn:
    - 📊 Visual Workflows: workflows/index.md
    - Tutorials Overview: tutorials/README.md
    - "Getting started": tutorials/getting-started.md
    - "rforge in the R package lifecycle": tutorials/rforge-in-the-r-lifecycle.md
    - "Understanding modes": tutorials/understanding-modes.md
    - "Ecosystem orchestration": tutorials/ecosystem-orchestration.md
    - "Orchestrator cookbook": tutorials/orchestrator-cookbook.md
    - "R package dev cycle": tutorials/r-dev-cycle.md
    - "Diff-aware checks": tutorials/diff-aware-checks.md
    - "S7 convention checking": tutorials/s7-convention-checking.md
    - "Scaffolding existing packages": tutorials/scaffolding-existing-packages.md
    - "CRAN release prep": tutorials/cran-release-prep.md
    - "CRAN submission with rforge": tutorials/cran-submission-with-rforge.md
    - "R-universe early-access": tutorials/r-universe-early-access.md
    - "Migrating from rforge-mcp": tutorials/migrate-from-mcp.md
  - Reference:
    - 📚 Reference Card: REFCARD.md
    - Commands: commands.md
    - 🤖 Orchestrator Agent: orchestrator.md
    - Configuration: configuration.md
    - Lib Modules: lib-modules.md
    - Troubleshooting: troubleshooting.md
    - API:
      - "discovery": reference/discovery.md
      - "deps": reference/deps.md
      - "deps_sync": reference/deps_sync.md
      - "status": reference/status.md
      - "init": reference/init.md
      - "rcmd": reference/rcmd.md
      - "cranlint": reference/cranlint.md
      - "ghrelease": reference/ghrelease.md
      - "runiverse": reference/runiverse.md
      - "s7review": reference/s7review.md
      - "changed": reference/changed.md
      - "scaffold": reference/scaffold.md
  - Project:
    - Architecture: architecture.md
    - Hooks & Skills: hooks-and-skills.md
    - Specs:
      - Overview: specs/README.md
      - "MCP absorb (Path B)": specs/SPEC-mcp-absorb-2026-05-10.md
      - "Phase 3 namespacing (v2.0.0)": specs/SPEC-phase3-namespacing-2026-05-11.md
      - "Diff-aware checks & coverage": specs/SPEC-diff-aware-checks-and-coverage-2026-05-31.md
      - "r: dev-cycle + quality commands (v2.1.0)": specs/SPEC-r-dev-commands-2026-05-31.md
    - Migration:
      - "v2.0.0 command rename": migration/v2.0.0-rename.md
      - "rforge-mcp deprecation": migration/rforge-mcp-deprecation.md
      - "v1.3.0 post-merge checklist": migration/v1.3.0-post-merge-checklist.md
