site_name: RForge Plugin
site_description: R package ecosystem orchestrator - 16 self-contained commands for R package development, ecosystem management, and intelligent orchestration (pure-Python lib/, no MCP server required)
site_url: https://data-wise.github.io/rforge/

repo_name: Data-Wise/rforge
repo_url: https://github.com/Data-Wise/rforge
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Start here:
    - 📦 Installation: installation.md
    - 🚀 Quick Start (3 min): QUICK-START.md
    - 📖 Detailed Quick Start: quickstart.md
  - 📊 Visual Workflows: workflows/index.md
  - Tutorials:
    - Overview: tutorials/README.md
    - "Getting started": tutorials/getting-started.md
    - "rforge in the R package lifecycle": tutorials/rforge-in-the-r-lifecycle.md
    - "Understanding modes": tutorials/understanding-modes.md
    - "Ecosystem orchestration": tutorials/ecosystem-orchestration.md
    - "CRAN release prep": tutorials/cran-release-prep.md
    - "Migrating from rforge-mcp": tutorials/migrate-from-mcp.md
  - 📚 Reference Card: REFCARD.md
  - Commands: commands.md
  - Architecture: architecture.md
  - Hooks & Skills: hooks-and-skills.md
  - Configuration: configuration.md
  - Lib Modules: lib-modules.md
  - Troubleshooting: troubleshooting.md
  - Reference:
    - "discovery API": reference/discovery.md
    - "deps API": reference/deps.md
    - "status API": reference/status.md
    - "init API": reference/init.md
  - Specs:
    - Overview: specs/README.md
    - "MCP absorb (Path B)": specs/SPEC-mcp-absorb-2026-05-10.md
    - "Phase 3 namespacing (v2.0.0)": specs/SPEC-phase3-namespacing-2026-05-11.md
    - "Diff-aware checks & coverage": specs/SPEC-diff-aware-checks-and-coverage-2026-05-31.md
  - Migration:
    - "v2.0.0 command rename": migration/v2.0.0-rename.md
    - "rforge-mcp deprecation": migration/rforge-mcp-deprecation.md
    - "v1.3.0 post-merge checklist": migration/v1.3.0-post-merge-checklist.md
