site_name: RForge Plugin
site_description: R package ecosystem orchestrator - 15 commands for R package development, ecosystem management, and intelligent orchestration with MCP integration
site_url: https://data-wise.github.io/rforge/

repo_name: Data-Wise/rforge
repo_url: https://github.com/Data-Wise/rforge
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - 🚀 Quick Start: QUICK-START.md
  - 📖 Detailed Quick Start: quickstart.md
  - 📚 Reference Card: REFCARD.md
  - Commands: commands.md
  - Architecture: architecture.md
  - Hooks & Skills: hooks-and-skills.md
  - Configuration: configuration.md
  - Specs:
    - Overview: specs/README.md
    - "MCP absorb (Path B)": specs/SPEC-mcp-absorb-2026-05-10.md
